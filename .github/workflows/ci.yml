# BiscuitCode — Continuous Integration
#
# Phase 1 deliverable: skeleton scaffolded so that PRs from Phase 1 onward
# trigger lint + typecheck + test + audit gates. Each phase enables the jobs
# relevant to its deliverables (e.g. Phase 5 turns on the e2e test job for
# the Anthropic provider; Phase 9 turns on a11y).
#
# Phase 10 deliverable: this file is fully populated with all the gates
# required to merge a release-candidate PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin everything we care about. Update only when the plan says to.
  RUST_TOOLCHAIN: stable
  NODE_VERSION: 20
  PNPM_VERSION: 9
  TAURI_CLI_VERSION: 2.10.1

jobs:

  # ---------------------------------------------------------------------------
  # lint — fast feedback. Runs on every PR.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (clippy + eslint)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config libdbus-1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libfuse2t64 file build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        run: pnpm lint

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # typecheck — TypeScript no-emit.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: tsc --noEmit
        run: pnpm exec tsc --noEmit

  # ---------------------------------------------------------------------------
  # test — unit + integration + i18n lint + a11y.
  # ---------------------------------------------------------------------------
  test:
    name: Tests (cargo + pnpm + i18n + a11y)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config libdbus-1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libfuse2t64 file build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: cargo test --workspace
        working-directory: src-tauri
        run: cargo test --workspace --all-features

      - name: pnpm test
        run: pnpm test

      # i18n lint: verifies all t('key') calls have entries in en.json.
      # Script created in Phase 2 (scripts/check-i18n.js).
      - name: pnpm check:i18n
        run: pnpm check:i18n

      # a11y: Phase 9 ships inline a11y (OnboardingModal focus trap,
      # role="log" aria-live on chat container). A dedicated axe-core
      # gate is a v1.1 follow-up; no test:a11y script exists yet.

  # ---------------------------------------------------------------------------
  # audit — security. cargo audit + pnpm audit. Both must be clean before merge.
  # ---------------------------------------------------------------------------
  audit:
    name: Security audit (cargo + pnpm)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm audit --prod
        run: pnpm audit --prod

  # ---------------------------------------------------------------------------
  # license — every dependency must be MIT/Apache-2.0/BSD compatible.
  # ---------------------------------------------------------------------------
  license-scan:
    name: License compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install cargo-license --locked

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: cargo license check
        working-directory: src-tauri
        run: |
          cargo license --json > /tmp/cargo-licenses.json
          # Block strong copyleft only: GPL, AGPL, LGPL, SSPL.
          # MPL-2.0 is permitted (file-level copyleft, standard in the Rust
          # ecosystem — cssparser, selectors, option-ext, etc.).
          # For OR-combined licenses ("Apache-2.0 OR LGPL-2.1-or-later OR MIT")
          # we accept the crate if ANY alternative is in the safe set.
          # Allowed: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC,
          # Unlicense, Zlib, CC0-1.0, MPL-2.0, 0BSD.
          DISALLOWED=$(jq -r '
            def is_safe(lic): lic | test("^(MIT|Apache-2\\.0|BSD-[23]-Clause|ISC|Unlicense|Zlib|CC0-1\\.0|MPL-2\\.0|0BSD)$");
            def has_safe_alt(s):
              (s | split(" OR ") | map(is_safe(.)) | any);
            .[]
            | .license as $L
            | select(($L // "") != "")
            | select(($L | test("GPL|AGPL|LGPL|SSPL"; "i")))
            | select((has_safe_alt($L)) | not)
            | "\(.name) \(.version) (\($L))"
          ' /tmp/cargo-licenses.json)
          if [ -n "$DISALLOWED" ]; then
            echo "ERROR: disallowed licenses found in Cargo dependencies:"
            echo "$DISALLOWED"
            exit 1
          fi
          echo "Cargo license check passed."

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm license check
        run: |
          npx --yes license-checker-rseidelsohn \
            --production \
            --excludePackages "biscuitcode" \
            --failOn 'GPL-3.0;AGPL-3.0;LGPL-3.0;SSPL-1.0;BSL-1.1'
