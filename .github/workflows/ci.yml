# BiscuitCode — Continuous Integration
#
# Phase 1 deliverable: skeleton scaffolded so that PRs from Phase 1 onward
# trigger lint + typecheck + test + audit gates. Each phase enables the jobs
# relevant to its deliverables (e.g. Phase 5 turns on the e2e test job for
# the Anthropic provider; Phase 9 turns on a11y).
#
# Phase 10 deliverable: this file is fully populated with all the gates
# required to merge a release-candidate PR.
#
# Until each job's tests exist, jobs may be near-empty (--passWithNoTests / --
# || true) — but the workflow MUST run on every PR from Phase 1 forward so we
# catch CI-config regressions early instead of during release crunch.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin everything we care about. Update only when the plan says to.
  RUST_TOOLCHAIN: stable
  NODE_VERSION: 20
  PNPM_VERSION: 9
  TAURI_CLI_VERSION: 2.10.1

jobs:

  # ---------------------------------------------------------------------------
  # lint — fast feedback. Runs on every PR.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (clippy + eslint)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config libdbus-1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libfuse2t64 file build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        run: pnpm lint || echo '::warning::pnpm lint not yet configured'

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check || echo '::warning::cargo fmt not yet configured'

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets -- -D warnings || echo '::warning::clippy gate will fail PRs from Phase 1 onward — set up the workspace first'

  # ---------------------------------------------------------------------------
  # typecheck — TypeScript no-emit.
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: tsc --noEmit
        run: pnpm exec tsc --noEmit || echo '::warning::tsc errors — fix before merging'

  # ---------------------------------------------------------------------------
  # test — unit + integration. Phase 5+ adds the TTFT bench, Phase 6 adds
  # tool-card render gate, Phase 9 adds a11y, Phase 10 adds the canonical
  # 3-provider snapshot test.
  # ---------------------------------------------------------------------------
  test:
    name: Tests (cargo + pnpm)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            pkg-config libdbus-1-dev libgtk-3-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libwebkit2gtk-4.1-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libfuse2t64 file build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: cargo test --workspace
        working-directory: src-tauri
        run: cargo test --workspace --all-features || echo '::warning::cargo tests not yet wired'

      - name: pnpm test
        run: pnpm test --passWithNoTests || echo '::warning::pnpm tests not yet wired'

      # Phase 9 enables this gate (axe-core a11y on canonical screens).
      - name: pnpm test:a11y
        if: ${{ false }}  # flip to true when Phase 9 ships
        run: pnpm test:a11y

  # ---------------------------------------------------------------------------
  # audit — security. cargo audit + pnpm audit. Both must be clean before merge.
  # ---------------------------------------------------------------------------
  audit:
    name: Security audit (cargo + pnpm)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        working-directory: src-tauri
        run: cargo audit || echo '::warning::cargo audit not yet clean'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm audit --prod
        run: pnpm audit --prod || echo '::warning::pnpm audit --prod has open advisories'

  # ---------------------------------------------------------------------------
  # license — every dependency must be MIT/Apache-2.0/BSD compatible.
  # ---------------------------------------------------------------------------
  license-scan:
    name: License compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install cargo-license --locked

      - name: cargo license check
        working-directory: src-tauri
        run: |
          cargo license --json > /tmp/cargo-licenses.json
          # Fail if any license is NOT in the allowed set.
          # Allowed: MIT, Apache-2.0 (any variant), BSD-2/3-Clause, ISC, Unlicense, Zlib.
          # Disallowed: GPL-*, AGPL-*, LGPL-* (unless dynamically linked system lib),
          # SSPL, BSL, EPL, MPL-* (case-by-case).
          # Tools: jq + grep — wire when Phase 10 lands.
          echo "::warning::license-scan gate will be wired in Phase 10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install license-checker
        run: npx --yes license-checker-rseidelsohn --production --excludePackages "biscuitcode" --failOn 'GPL-3.0;AGPL-3.0;LGPL-3.0;SSPL-1.0;BSL-1.1' || echo '::warning::license-checker not yet wired against pnpm install output'
